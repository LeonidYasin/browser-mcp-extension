<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 100%;
      min-height: 100vh;
      padding: 20px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 13px;
      background: #fafafa;
    }
    h3 { margin-bottom: 4px; font-size: 16px; color: #1a1a1a; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }
    
    .status-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      border-left: 4px solid #888;
    }
    .status-box.idle { border-left-color: #888; }
    .status-box.processing { border-left-color: #ff9800; background: #fff3e0; }
    .status-box.done { border-left-color: #4caf50; background: #e8f5e9; }
    .status-box.error { border-left-color: #f44336; background: #ffebee; }
    
    .status-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
    }
    .status-text {
      font-size: 14px;
      font-weight: 500;
      margin-top: 2px;
    }
    .status-detail {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    
    label { display: block; margin-top: 12px; font-weight: 600; font-size: 12px; color: #333; }
    input { 
      width: 100%; padding: 8px 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; 
      font-size: 13px; background: white; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.1); }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    
    .checkbox-group {
      display: flex; align-items: center; gap: 10px; margin-top: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px; height: 18px; margin: 0; cursor: pointer;
    }
    .checkbox-group label { margin: 0; cursor: pointer; font-weight: 400; }
    
    .button-group {
      display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
    }
    button { 
      flex: 1; padding: 10px 12px; border: none; border-radius: 6px; 
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
      min-width: 80px;
    }
    #save { background: #1976d2; color: #fff; }
    #save:hover { background: #1565c0; }
    #test { background: #e0e0e0; color: #333; }
    #test:hover { background: #d0d0d0; }
    #scan { background: #4caf50; color: #fff; }
    #scan:hover { background: #388e3c; }
    
    #status { margin-top: 12px; font-size: 13px; min-height: 20px; padding: 8px 12px; border-radius: 6px; background: #f5f5f5; }
    .status-success { background: #e8f5e9 !important; color: #2e7d32; }
    .status-error { background: #ffebee !important; color: #c62828; }
    .status-info { background: #e3f2fd !important; color: #0d47a1; }
    .status-empty { background: #f5f5f5 !important; color: #666; }
    
    .divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }
    .stats { font-size: 11px; color: #888; display: flex; gap: 16px; margin-top: 8px; }
    .stats span { display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>
  <h3>🔌 MCP Bridge</h3>
  <div class="subtitle">GitHub MCP Server v0.3.0</div>
  
  <!-- Статус -->
  <div class="status-box idle" id="statusBox">
    <div class="status-label">Status</div>
    <div class="status-text" id="statusText">🟢 Idle</div>
    <div class="status-detail" id="statusDetail">Waiting for messages...</div>
  </div>
  
  <!-- Статистика -->
  <div class="stats">
    <span>📨 <span id="processedCount">0</span> processed</span>
    <span>⏳ <span id="pendingCount">0</span> pending</span>
  </div>
  
  <hr class="divider">
  
  <label>Bridge Server URL</label>
  <input type="text" id="bridgeUrl" placeholder="http://127.0.0.1:8080">
  <div class="hint">Local bridge server for processing</div>
  
  <label>MCP Server URL</label>
  <input type="text" id="mcpUrl" placeholder="http://127.0.0.1:3001/mcp">
  <div class="hint">MCP server with tools</div>
  
  <label>GitHub Token</label>
  <input type="password" id="token" placeholder="ghp_...">
  <div class="hint">Personal Access Token with repo permissions</div>
  
  <hr class="divider">
  
  <div class="checkbox-group">
    <input type="checkbox" id="autoSend">
    <label for="autoSend">✅ Auto-send results back to chat</label>
  </div>
  
  <label>Send delay (seconds)</label>
  <input type="number" id="sendDelay" min="0" max="10" step="0.5" value="1">
  <div class="hint">Delay before auto-sending (0 = instant)</div>
  
  <div class="button-group">
    <button id="save">💾 Save</button>
    <button id="test">🔍 Test</button>
    <button id="scan">📡 Scan</button>
  </div>
  
  <div id="status" class="status-empty">Ready</div>

  <script src="sidepanel.js"></script>
</body>
</html>
