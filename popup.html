<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; }
    h3 { margin-bottom: 12px; }
    label { display: block; margin-top: 8px; font-weight: 600; font-size: 12px; }
    input { width: 100%; padding: 6px 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
    input:focus { outline: none; border-color: #1976d2; }
    .hint { font-size: 11px; color: #888; margin-top: 2px; }
    button { padding: 8px 12px; margin-top: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #save { background: #1976d2; color: #fff; width: 100%; }
    #save:hover { background: #1565c0; }
    #test { background: #e0e0e0; color: #333; width: 100%; }
    #test:hover { background: #d0d0d0; }
    #scan { background: #4caf50; color: #fff; width: 100%; }
    #scan:hover { background: #388e3c; }
    #status { margin-top: 8px; font-size: 12px; min-height: 18px; padding: 6px; border-radius: 4px; background: #f5f5f5; }
    .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  </style>
</head>
<body>
  <h3>🔌 MCP Bridge</h3>
  
  <label>Bridge Server URL</label>
  <input type="text" id="bridgeUrl" placeholder="http://127.0.0.1:8080">
  <div class="hint">Локальный сервер обработки</div>
  
  <label>MCP Server URL</label>
  <input type="text" id="mcpUrl" placeholder="http://127.0.0.1:3001/mcp">
  <div class="hint">MCP-сервер с инструментами</div>
  
  <label>GitHub Token</label>
  <input type="password" id="token" placeholder="ghp_...">
  <div class="hint">Токен для GitHub API</div>
  
  <hr class="divider">
  
  <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
    <input type="checkbox" id="autoSend" style="width: 18px; height: 18px;">
    <label for="autoSend" style="margin: 0; font-weight: 400;">Auto-send results</label>
  </div>
  
  <label>Send delay (seconds)</label>
  <input type="number" id="sendDelay" min="0" max="10" step="0.5" value="1">
  
  <button id="save" style="margin-top: 12px;">💾 Save Settings</button>
  <button id="test" style="margin-top: 6px;">🔍 Test Connection</button>
  <button id="scan" style="margin-top: 6px;">📡 Scan Messages</button>
  
  <div id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
